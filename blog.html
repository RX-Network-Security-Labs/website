<script src="js/rnsl-data.js"></script>
<script>
const TG_CHANNEL = "rxnetworksecuritylabs";
const RSSHUB_INSTANCES = [
  "https://rsshub.app",
  "https://rss.shab.fun",
  "https://rsshub.rssforever.com"
];

function stripHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || "";
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" }).toUpperCase();
}

function truncate(text, len) {
  text = text.trim();
  return text.length > len ? text.slice(0, len).trimEnd() + "…" : text;
}

function renderPosts(items) {
  if (!items || items.length === 0) {
    return `<div class="card center" style="padding: 48px 32px;">
      <p>No posts yet — <a href="https://t.me/${TG_CHANNEL}" style="color:var(--signal)" target="_blank" rel="noopener">follow on Telegram →</a></p>
    </div>`;
  }

  return items.map(item => {
    const title = item.querySelector("title")?.textContent || "";
    const pubDate = item.querySelector("pubDate")?.textContent || "";
    const description = item.querySelector("description")?.textContent || "";
    const link = item.querySelector("link")?.textContent || `https://t.me/${TG_CHANNEL}`;

    const cleanText = stripHtml(description);
    const displayTitle = title && title !== "Untitled" ? title : truncate(cleanText, 80);
    const preview = truncate(cleanText, 220);
    const dateLabel = pubDate ? formatDate(pubDate) : "";

    return `
    <a href="${link}" target="_blank" rel="noopener" class="card mt-24" style="display:block; text-decoration:none;">
      <div class="mono faint" style="font-size: 12px;">${dateLabel} · TELEGRAM</div>
      <h3 class="mt-8" style="font-size: 17px; line-height: 1.4;">${rnslEscapeHtml(displayTitle)}</h3>
      ${preview !== displayTitle ? `<p class="mt-16" style="font-size:14px; color: var(--text-muted, #888);">${rnslEscapeHtml(preview)}</p>` : ""}
    </a>`;
  }).join("");
}

async function fetchFeed(instance) {
  const url = `${instance}/telegram/channel/${TG_CHANNEL}`;
  // Use allorigins as CORS proxy since direct RSS fetch is blocked by browser CORS
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const parser = new DOMParser();
  const xml = parser.parseFromString(json.contents, "text/xml");
  const items = Array.from(xml.querySelectorAll("item"));
  if (!items.length) throw new Error("empty feed");
  return items;
}

(async function() {
  const feedEl = document.getElementById("blog-feed");
  const statusEl = document.getElementById("blog-sync-status");

  let items = null;
  let lastErr = "";

  for (const instance of RSSHUB_INSTANCES) {
    try {
      items = await fetchFeed(instance);
      break;
    } catch (e) {
      lastErr = e.message;
      console.warn("RNSL blog: failed instance", instance, e.message);
    }
  }

  if (!items) {
    statusEl.textContent = "⚠ couldn't sync with Telegram right now";
    feedEl.innerHTML = `
      <div class="card center" style="padding: 48px 32px;">
        <p>Feed unavailable right now.</p>
        <a href="https://t.me/${TG_CHANNEL}" class="btn btn-primary mt-24" target="_blank" rel="noopener">Read on Telegram →</a>
      </div>`;
    return;
  }

  statusEl.textContent = `✓ synced just now · ${items.length} posts from @${TG_CHANNEL}`;
  feedEl.innerHTML = renderPosts(items);
})();
</script>
